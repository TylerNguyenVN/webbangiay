<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thông tin cá nhân | TL Shop</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,600&display=swap"
    rel="stylesheet">

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            display: ['"Playfair Display"', 'serif'],
            sans: ['Montserrat', 'sans-serif']
          }
        }
      }
    }
  </script>
</head>

<body>
  <div
    class="min-h-screen flex flex-col font-sans transition-colors duration-300 bg-[#FDFBF7] text-[#3D4035] dark:bg-[#0f110c] dark:text-[#e4e7dd]"
    id="app-container">

    <!-- TOP HEADER -->
    <header
      class="fixed top-0 w-full z-40 bg-white dark:bg-[#151712] shadow-sm h-16 flex justify-between items-center px-6 md:px-12 border-b border-[#F0EBE0] dark:border-[#2c2f25]">
      <div class="flex items-center gap-8">
        <h1
          class="font-display font-bold text-2xl text-[#5B634E] dark:text-[#b4bda5] tracking-wide cursor-pointer flex items-center gap-1.5"
          onclick="window.location.href='index.html'">
          <i data-lucide="compass" class="w-6 h-6 text-[#BC8E5C]"></i> TL Shop
        </h1>
      </div>
      <div class="flex items-center gap-4">
      </div>
    </header>

    <!-- MAIN COMPREHENSIVE AREA -->
    <main class="flex-1 w-full max-w-[1120px] mx-auto px-6 md:px-12 pt-28 pb-24 md:pb-16 flex flex-col items-stretch">
      <div class="grid grid-cols-1 lg:grid-cols-12 gap-10 items-start w-full">

        <!-- LEFT COLUMN: Profile info -->
        <aside class="lg:col-span-4 flex flex-col gap-8">
          <div
            class="bg-white dark:bg-[#151712] border border-[#F0EBE0] dark:border-[#2c2f25] p-10 rounded-[32px] flex flex-col items-center text-center shadow-sm">
            <div class="relative mb-6">
              <div class="w-32 h-32 rounded-full overflow-hidden border-4 border-neutral-100 dark:border-neutral-800">
                <img id="profile-avatar" src="" alt="Avatar" class="w-full h-full object-cover" />
              </div>
              <button
                class="absolute bottom-1 right-1 bg-[#5B634E] p-2 rounded-full border-2 border-white dark:border-[#151712] text-white hover:bg-[#4d5442] transition-all shadow-md">
                <i data-lucide="camera" class="w-4 h-4"></i>
              </button>
            </div>

            <h2 id="profile-name" class="font-display text-2xl font-bold text-[#2D3025] dark:text-[#FDFBF7] mb-2">Đang
              tải...</h2>

            <div
              class="inline-flex items-center gap-2 bg-[#F2EDE4]/60 dark:bg-[#20231c] text-[#BC8E5C] px-4 py-1.5 rounded-full border border-[#EAE5D8] dark:border-[#2a2d24]">
              <i data-lucide="sparkles" class="w-3.5 h-3.5"></i>
              <span id="profile-role" class="font-sans text-xs font-bold tracking-wider uppercase">Khách Hàng</span>
            </div>

            <div
              class="w-full mt-10 pt-8 border-t border-[#F0EBE0]/60 dark:border-[#2c2f25]/60 flex flex-col gap-4 font-sans text-xs">
              <div class="flex justify-between items-center text-[#7C7F6E] dark:text-[#9ea390]">
                <span class="font-medium">Thành viên từ</span>
                <span class="text-[#2D3025] dark:text-[#FDFBF7] font-semibold">Năm nay</span>
              </div>
              <div class="flex justify-between items-center text-[#7C7F6E] dark:text-[#9ea390]">
                <span class="font-medium">Đăng nhập gần nhất</span>
                <span class="text-[#2D3025] dark:text-[#FDFBF7] font-semibold">Vừa xong</span>
              </div>
            </div>
          </div>
        </aside>

        <!-- RIGHT COLUMN: Loyalty Card + Personal details form -->
        <div class="lg:col-span-8 flex flex-col gap-8">

          <!-- Loyalty Rewards Card -->
          <section
            class="bg-[#F2EDE4] dark:bg-[#151712] border border-[#EAE5D8] dark:border-[#2c2f25] rounded-[32px] p-8 relative overflow-hidden shadow-sm">
            <div class="flex flex-col gap-6">
              <div class="flex justify-between items-end">
                <div>
                  <p class="text-[10px] font-sans font-bold text-[#BC8E5C] uppercase tracking-widest mb-1">Thẻ Khách
                    Hàng Thân Thiết</p>
                  <h3 class="font-display text-xl md:text-2xl font-bold text-[#2D3025] dark:text-[#FDFBF7]">Điểm hiện
                    tại: 1,500 PTS</h3>
                </div>
                <span class="text-[10px] font-sans text-[#7C7F6E] dark:text-[#9ea390] mb-1 font-semibold">50% lên hạng
                  Diamond</span>
              </div>
              <div
                class="w-full bg-white dark:bg-[#1a1d17] rounded-full h-3 p-0.5 border border-[#EAE5D8] dark:border-[#2c2f25]">
                <div class="h-full rounded-full bg-gradient-to-r from-[#5B634E] to-[#BC8E5C]" style="width: 50%"></div>
              </div>
              <div
                class="flex justify-between text-[10px] font-sans text-[#7C7F6E] dark:text-[#9ea390] font-bold uppercase tracking-wider">
                <span class="text-[#BC8E5C]">Hạng Vàng</span>
                <span class="opacity-50">Hạng Kim Cương</span>
              </div>
            </div>
          </section>

          <!-- Personal Details Form -->
          <section
            class="bg-white dark:bg-[#151712] border border-[#F0EBE0] dark:border-[#2c2f25] p-10 rounded-[32px] shadow-sm relative">
            <div class="flex justify-between items-center mb-10">
              <h3 class="font-display text-xl md:text-2xl font-bold text-[#2D3025] dark:text-[#FDFBF7]">Thông tin cá
                nhân</h3>
            </div>

            <form class="flex flex-col gap-8" id="profile-form">
              <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="flex flex-col gap-2">
                  <label
                    class="font-sans text-xs font-bold text-[#7C7F6E] dark:text-[#9ea390] ml-1 uppercase tracking-wider">Họ
                    và tên</label>
                  <input type="text" id="input-name"
                    class="w-full bg-[#F5F1E8] dark:bg-[#1c2019] border-none rounded-2xl p-4 font-sans text-sm text-[#2D3025] dark:text-[#FDFBF7] focus:ring-2 focus:ring-[#5B634E]/30 outline-none transition-shadow font-semibold"
                    disabled />
                </div>
                <div class="flex flex-col gap-2">
                  <label
                    class="font-sans text-xs font-bold text-[#7C7F6E] dark:text-[#9ea390] ml-1 uppercase tracking-wider">Email</label>
                  <input type="email" id="input-email"
                    class="w-full bg-[#F5F1E8] dark:bg-[#1c2019] border-none rounded-2xl p-4 font-sans text-sm text-[#2D3025] dark:text-[#FDFBF7] focus:ring-2 focus:ring-[#5B634E]/30 outline-none transition-shadow font-semibold"
                    disabled />
                </div>
              </div>
              <div class="flex flex-col gap-2">
                <label
                  class="font-sans text-xs font-bold text-[#7C7F6E] dark:text-[#9ea390] ml-1 uppercase tracking-wider">Số
                  điện thoại</label>
                <input type="tel" id="input-phone"
                  class="w-full bg-[#F5F1E8] dark:bg-[#1c2019] border-none rounded-2xl p-4 font-sans text-sm text-[#2D3025] dark:text-[#FDFBF7] focus:ring-2 focus:ring-[#5B634E]/30 outline-none transition-shadow font-semibold"
                  disabled />
              </div>
              <div class="flex flex-col gap-2">
                <label
                  class="font-sans text-xs font-bold text-[#7C7F6E] dark:text-[#9ea390] ml-1 uppercase tracking-wider">Địa
                  chỉ giao hàng</label>
                <input type="text" id="input-address"
                  class="w-full bg-[#F5F1E8] dark:bg-[#1c2019] border-none rounded-2xl p-4 font-sans text-sm text-[#2D3025] dark:text-[#FDFBF7] focus:ring-2 focus:ring-[#5B634E]/30 outline-none transition-shadow font-semibold"
                  disabled />
              </div>

              <div
                class="mt-4 flex flex-col md:flex-row items-center justify-end gap-4 border-t border-[#F0EBE0] dark:border-[#2c2f25]/40 pt-6">
                <button type="button" id="edit-btn"
                  class="border border-[#5B634E] dark:border-[#b4bda5] text-[#5B634E] dark:text-[#b4bda5] font-sans text-xs font-bold px-10 py-4 rounded-full hover:bg-[#F2EDE4] dark:hover:bg-[#1c2019] transition-all cursor-pointer w-full md:w-auto">
                  Chỉnh sửa thông tin
                </button>
                <button type="button" onclick="window.location.href='index.html'"
                  class="bg-[#5B634E] dark:bg-[#2c2f25] text-white font-sans text-xs font-bold px-10 py-4 rounded-full hover:bg-[#4d5442] dark:hover:bg-[#343a2b] transition-all cursor-pointer w-full md:w-auto">
                  Quay về Trang chủ
                </button>
              </div>
            </form>
          </section>

        </div>
      </div>
    </main>
  </div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    // Khởi tạo Icon
    lucide.createIcons();



    // Đổ dữ liệu thật từ LocalStorage vào
    const userStr = localStorage.getItem("nike_current_user");
    if (userStr) {
      const user = JSON.parse(userStr);
      document.getElementById("profile-name").textContent = user.name || "Chưa cập nhật";
      document.getElementById("profile-role").textContent = user.role === 'admin' ? 'Quản trị viên' : 'Khách Hàng';
      document.getElementById("input-name").value = user.name || "Chưa cập nhật";
      document.getElementById("input-email").value = user.email || "Chưa cập nhật";
      document.getElementById("input-phone").value = user.phone || "Chưa cập nhật";
      document.getElementById("input-address").value = user.address || "Chưa cập nhật";

      // Tạo avatar tạm từ chữ cái đầu của tên
      document.getElementById("profile-avatar").src = `https://ui-avatars.com/api/?name=${encodeURIComponent(user.name || 'User')}&background=5B634E&color=fff&size=200`;

      // LOGIC CHỈNH SỬA VÀ LƯU
      const editBtn = document.getElementById("edit-btn");
      const inputs = [
        document.getElementById("input-name"),
        document.getElementById("input-phone"),
        document.getElementById("input-address")
      ];
      // (Email thường cố định nên không đưa vào mảng cho phép sửa)

      let isEditing = false;

      editBtn.addEventListener("click", async () => {
        if (!isEditing) {
          // BẬT CHẾ ĐỘ SỬA
          isEditing = true;
          editBtn.textContent = "Lưu thay đổi";
          editBtn.classList.add("bg-[#5B634E]", "text-white");
          inputs.forEach(input => {
            input.disabled = false;
            input.classList.remove("bg-[#F5F1E8]", "dark:bg-[#1c2019]", "border-none");
            input.classList.add("bg-white", "dark:bg-[#2c2f25]", "border", "border-[#BC8E5C]");
            if (input.value === "Chưa cập nhật") input.value = "";
          });
          inputs[0].focus();
        } else {
          // LƯU DỮ LIỆU
          const newName = inputs[0].value.trim();
          const newPhone = inputs[1].value.trim();
          const newAddress = inputs[2].value.trim();

          if (!newName) { alert("Họ tên không được để trống!"); return; }

          editBtn.textContent = "Đang lưu...";
          editBtn.disabled = true;

          try {
            const res = await fetch("update_profile.php", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                id: user.id,
                name: newName,
                phone: newPhone,
                address: newAddress
              })
            });
            const data = await res.json();

            if (data.success) {
              // Cập nhật vào Session/LocalStorage
              user.name = newName;
              user.phone = newPhone;
              user.address = newAddress;
              localStorage.setItem("nike_current_user", JSON.stringify(user));

              // Cập nhật UI
              document.getElementById("profile-name").textContent = newName;
              document.getElementById("profile-avatar").src = `https://ui-avatars.com/api/?name=${encodeURIComponent(newName)}&background=5B634E&color=fff&size=200`;
            } else {
              alert(data.message || "Lưu thất bại.");
            }
          } catch (e) {
            alert("Lỗi kết nối máy chủ.");
          } finally {
            // Tắt chế độ sửa
            isEditing = false;
            editBtn.textContent = "Chỉnh sửa thông tin";
            editBtn.disabled = false;
            editBtn.classList.remove("bg-[#5B634E]", "text-white");
            inputs.forEach(input => {
              input.disabled = true;
              input.classList.add("bg-[#F5F1E8]", "dark:bg-[#1c2019]", "border-none");
              input.classList.remove("bg-white", "dark:bg-[#2c2f25]", "border", "border-[#BC8E5C]");
              if (!input.value) input.value = "Chưa cập nhật";
            });
          }
        }
      });
    } else {
      // Nếu chưa đăng nhập thì đẩy về trang Đăng nhập
      alert("Vui lòng đăng nhập để xem thông tin.");
      window.location.href = "auth.html";
    }
  </script>
</body>

</html>
