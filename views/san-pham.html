<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tất cả sản phẩm - TL Shop</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">

  
  <link rel="stylesheet" href="css/style.css">

  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    
    .pagination-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1.75rem;
      margin-top: 4rem;
      margin-bottom: 3rem;
      font-family: var(--font-sans), -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      user-select: none;
    }
    
    .pag-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      border: none;
      background: transparent;
      color: #6b7280;
      padding: 0.5rem 0.75rem;
      font-size: 0.8125rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      cursor: pointer;
      outline: none;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
    }
    
    .pag-btn:hover:not(:disabled) {
      color: #053225;
      transform: translateY(-1px);
    }

    .pag-btn:active:not(:disabled) {
      transform: translateY(0);
    }
    
    .pag-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    
    .pag-pages {
      display: flex;
      gap: 1.25rem;
      align-items: center;
    }
    
    .pag-page {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      color: #9ca3af;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      height: 2.25rem;
      min-width: 1.5rem;
      position: relative;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    .pag-page:hover {
      color: #053225;
      transform: scale(1.08);
    }
    
    .pag-page.active {
      color: #053225;
      font-weight: 700;
    }
    
    .pag-page.active::after {
      content: '';
      position: absolute;
      bottom: 2px;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      height: 4px;
      background-color: #053225;
      border-radius: 50%;
      animation: scaleIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    
    .pag-ellipsis {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.5rem;
      height: 2.25rem;
      color: #d1d5db;
      font-size: 0.875rem;
      letter-spacing: 0.1em;
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: translateX(-50%) scale(0);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) scale(1);
      }
    }

    .catalog-hero {
      background: linear-gradient(135deg, #053225, #0a1f1a);
      color: #fff;
      padding: 3rem 1.5rem;
      text-align: center;
      margin-bottom: 2rem;
    }

    .catalog-hero h1 {
      font-family: var(--font-display);
      font-size: 2.25rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }

    .catalog-hero p {
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.7);
      max-width: 600px;
      margin: 0 auto;
      font-weight: 300;
    }

    
    .catalog-toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 1rem;
      width: 100%;
      margin: 0 0 1.5rem;
      padding: 0;
    }

    .catalog-toolbar-count {
      font-size: 0.8125rem;
      color: #78716c;
      font-weight: 500;
      margin: 0;
      flex-shrink: 0;
    }

    .sort-dropdown {
      position: relative;
      display: inline-block;
      text-align: left;
      margin-left: auto;
      flex-shrink: 0;
    }

    .sort-dropdown__trigger {
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      min-width: 220px;
      padding: 0.625rem 1rem;
      background: #fff;
      border: 1px solid #e7e5e4;
      border-radius: 12px;
      font-size: 0.875rem;
      font-weight: 500;
      color: #44403c;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .sort-dropdown__trigger:hover {
      border-color: #d6d3d1;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
    }

    .sort-dropdown__trigger:focus-visible {
      outline: 2px solid rgba(13, 148, 136, 0.35);
      outline-offset: 2px;
    }

    .sort-dropdown__label {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .sort-dropdown__chevron {
      width: 1rem;
      height: 1rem;
      color: #a8a29e;
      flex-shrink: 0;
      transition: transform 0.2s ease-out;
    }

    .sort-dropdown__chevron.is-open {
      transform: rotate(180deg);
    }

    .sort-dropdown__menu {
      position: absolute;
      right: 0;
      z-index: 50;
      margin-top: 0.5rem;
      width: 100%;
      min-width: 240px;
      padding: 0.375rem 0;
      background: #fff;
      border: 1px solid #e7e5e4;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(28, 25, 23, 0.08);
      opacity: 0;
      transform: scale(0.95);
      transform-origin: top right;
      pointer-events: none;
      transition: opacity 0.2s ease-out, transform 0.2s ease-out;
    }

    .sort-dropdown__menu.is-open {
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
    }

    .sort-dropdown__option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      width: 100%;
      padding: 0.625rem 1rem;
      border: none;
      background: transparent;
      font-size: 0.875rem;
      color: #44403c;
      text-align: left;
      cursor: pointer;
      transition: background-color 0.15s;
    }

    .sort-dropdown__option:hover {
      background: #fafaf9;
    }

    .sort-dropdown__option.is-selected {
      background: #f0fdfa;
      color: #115e59;
      font-weight: 500;
    }

    .sort-dropdown__check {
      width: 1rem;
      height: 1rem;
      color: #0d9488;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .sort-dropdown__check.is-visible {
      opacity: 1;
    }

    @media (max-width: 480px) {
      .catalog-toolbar {
        flex-direction: column;
        align-items: stretch;
      }

      .sort-dropdown {
        margin-left: 0;
        width: 100%;
      }

      .sort-dropdown__trigger {
        width: 100%;
      }
    }
  </style>
</head>

<body class="app-body">

  <div id="main-content" class="main-content">

    <div id="screen-light" class="screen-view light-theme show">
      
      <div id="header-placeholder"></div>

      
      <div class="catalog-hero">
        <h1>BỘ SƯU TẬP SẢN PHẨM</h1>
        <p>Khám phá toàn bộ dải sản phẩm giày thể thao cao cấp nhất tại TL Shop. Trải nghiệm tốc độ, sự êm ái và đẳng cấp thời thượng.</p>
      </div>

      
      
      <section class="products-section light-products" style="padding-top: 1rem;">

        
        <div class="catalog-toolbar">
          <p class="catalog-toolbar-count" id="catalog-product-count"></p>

          <div id="product-sort-dropdown" class="sort-dropdown">
            <button
              type="button"
              class="sort-dropdown__trigger"
              data-sort-trigger
              aria-haspopup="listbox"
              aria-expanded="false"
            >
              <span class="sort-dropdown__label" data-sort-label>Sắp xếp theo</span>
              <svg class="sort-dropdown__chevron" data-sort-chevron viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.94a.75.75 0 111.08 1.04l-4.24 4.5a.75.75 0 01-1.08 0l-4.24-4.5a.75.75 0 01.02-1.06z" clip-rule="evenodd" />
              </svg>
            </button>

            <div class="sort-dropdown__menu" data-sort-menu role="listbox" aria-label="Sắp xếp sản phẩm">
              <button type="button" class="sort-dropdown__option" role="option" data-sort-option data-value="price-asc" aria-selected="false">
                <span>Giá: Thấp đến Cao</span>
                <svg class="sort-dropdown__check" data-sort-check viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                  <path fill-rule="evenodd" d="M16.704 4.153a.75.75 0 01.143 1.052l-8 10.5a.75.75 0 01-1.127.075l-4.5-4.5a.75.75 0 011.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 011.05-.143z" clip-rule="evenodd" />
                </svg>
              </button>
              <button type="button" class="sort-dropdown__option" role="option" data-sort-option data-value="price-desc" aria-selected="false">
                <span>Giá: Cao đến Thấp</span>
                <svg class="sort-dropdown__check" data-sort-check viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                  <path fill-rule="evenodd" d="M16.704 4.153a.75.75 0 01.143 1.052l-8 10.5a.75.75 0 01-1.127.075l-4.5-4.5a.75.75 0 011.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 011.05-.143z" clip-rule="evenodd" />
                </svg>
              </button>
              <button type="button" class="sort-dropdown__option" role="option" data-sort-option data-value="bestseller" aria-selected="false">
                <span>Bán chạy nhất</span>
                <svg class="sort-dropdown__check" data-sort-check viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                  <path fill-rule="evenodd" d="M16.704 4.153a.75.75 0 01.143 1.052l-8 10.5a.75.75 0 01-1.127.075l-4.5-4.5a.75.75 0 011.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 011.05-.143z" clip-rule="evenodd" />
                </svg>
              </button>
              <button type="button" class="sort-dropdown__option" role="option" data-sort-option data-value="name-asc" aria-selected="false">
                <span>Tên: Từ A đến Z</span>
                <svg class="sort-dropdown__check" data-sort-check viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                  <path fill-rule="evenodd" d="M16.704 4.153a.75.75 0 01.143 1.052l-8 10.5a.75.75 0 01-1.127.075l-4.5-4.5a.75.75 0 011.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 011.05-.143z" clip-rule="evenodd" />
                </svg>
              </button>
              <button type="button" class="sort-dropdown__option" role="option" data-sort-option data-value="name-desc" aria-selected="false">
                <span>Tên: Từ Z đến A</span>
                <svg class="sort-dropdown__check" data-sort-check viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                  <path fill-rule="evenodd" d="M16.704 4.153a.75.75 0 01.143 1.052l-8 10.5a.75.75 0 01-1.127.075l-4.5-4.5a.75.75 0 011.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 011.05-.143z" clip-rule="evenodd" />
                </svg>
              </button>
              <button type="button" class="sort-dropdown__option" role="option" data-sort-option data-value="newest" aria-selected="false">
                <span>Hàng mới nhất</span>
                <svg class="sort-dropdown__check" data-sort-check viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                  <path fill-rule="evenodd" d="M16.704 4.153a.75.75 0 01.143 1.052l-8 10.5a.75.75 0 01-1.127.075l-4.5-4.5a.75.75 0 011.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 011.05-.143z" clip-rule="evenodd" />
                </svg>
              </button>
              <button type="button" class="sort-dropdown__option" role="option" data-sort-option data-value="oldest" aria-selected="false">
                <span>Cũ nhất</span>
                <svg class="sort-dropdown__check" data-sort-check viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                  <path fill-rule="evenodd" d="M16.704 4.153a.75.75 0 01.143 1.052l-8 10.5a.75.75 0 01-1.127.075l-4.5-4.5a.75.75 0 011.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 011.05-.143z" clip-rule="evenodd" />
                </svg>
              </button>
            </div>
          </div>
        </div>

        
        <div class="product-list" id="home-product-list">
          
        </div>

        
        <div class="pagination-bar" id="pagination-container">
          
        </div>
      </section>

      
      <div id="footer-placeholder"></div>
    </div>
  </div>

  
  <div id="chatbox-widget" class="chatbot-widget">
    <div id="chat-window" class="chat-window hidden">
      <div class="chat-header">
        <div class="chat-header-left">
          <button id="chat-back-btn" class="chat-back-btn hidden">
            <i data-lucide="chevron-left"></i>
          </button>
          <div class="bot-avatar">
            <i id="chat-header-icon" data-lucide="message-circle"></i>
            <span class="bot-status-dot"></span>
          </div>
          <div>
            <h4 id="chat-header-title" class="bot-name">Hỗ trợ trực tuyến</h4>
            <span id="chat-header-status" class="bot-status">Sẵn sàng hỗ trợ</span>
          </div>
        </div>
        <button id="close-chat-btn" class="close-chat-btn">
          <i data-lucide="x"></i>
        </button>
      </div>
      <div id="view-chat-detail" class="chat-view active">
        <div id="chat-messages" class="chat-messages"></div>
        <div class="chat-input-area">
          <input type="text" id="chat-input" placeholder="Nhập tin nhắn..." autocomplete="off" />
          <button id="send-chat-btn" class="send-chat-btn">
            <i data-lucide="send" style="width:16px;height:16px;"></i>
          </button>
        </div>
      </div>
    </div>
    <button id="chatbot-toggle-btn" class="chatbot-toggle-btn">
      <div class="bot-icon-wrapper">
        <i data-lucide="message-circle" style="color:white; width:28px; height:28px;"></i>
      </div>
      <span id="chat-badge" class="chat-badge hidden">0</span>
      <span class="toggle-ping"></span>
    </button>
  </div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    
    async function loadTemplate(placeholderId, filePath) {
      try {
        const response = await fetch(filePath);
        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
        const content = await response.text();
        document.getElementById(placeholderId).innerHTML = content;
      } catch (error) {
        console.error(`Failed to load ${filePath}:`, error);
      }
    }

    async function initPageComponents() {
      await Promise.all([
        loadTemplate('header-placeholder', 'components/header.html'),
        loadTemplate('footer-placeholder', 'components/footer.html')
      ]);

      if (window.lucide) {
        lucide.createIcons();
      }

      
      const sortScript = document.createElement('script');
      sortScript.src = 'js/sort-dropdown.js?v=' + Date.now();
      document.body.appendChild(sortScript);

      sortScript.onload = () => {
        const script = document.createElement('script');
        script.src = 'js/san-pham.js?v=' + Date.now();
        document.body.appendChild(script);
      };
    }

    document.addEventListener("DOMContentLoaded", initPageComponents);
  </script>
</body>

</html>
