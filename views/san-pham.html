<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tất cả sản phẩm - TL Shop</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">

  
  <link rel="stylesheet" href="css/style.css">

  <script src="https://unpkg.com/lucide@latest"></script>


</head>

<body class="app-body">

  <div id="main-content" class="main-content">

    <div id="screen-light" class="screen-view light-theme show">
      
      <div id="header-placeholder"></div>

      
      <div class="catalog-hero">
        <h1>BỘ SƯU TẬP SẢN PHẨM</h1>
        <p>Khám phá toàn bộ dải sản phẩm giày thể thao cao cấp nhất tại TL Shop. Trải nghiệm tốc độ, sự êm ái và đẳng cấp thời thượng.</p>
      </div>

      
      
      <section class="products-section light-products catalog-products-section">

        
        <div class="catalog-toolbar">
          <p class="catalog-toolbar-count" id="catalog-product-count"></p>

          <div id="product-sort-dropdown" class="sort-dropdown">
            <button
              type="button"
              class="sort-dropdown__trigger"
              data-sort-trigger
              aria-haspopup="listbox"
              aria-expanded="false"
            >
              <span class="sort-dropdown__label" data-sort-label>Sắp xếp theo</span>
              <svg class="sort-dropdown__chevron" data-sort-chevron viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.94a.75.75 0 111.08 1.04l-4.24 4.5a.75.75 0 01-1.08 0l-4.24-4.5a.75.75 0 01.02-1.06z" clip-rule="evenodd" />
              </svg>
            </button>

            <div class="sort-dropdown__menu" data-sort-menu role="listbox" aria-label="Sắp xếp sản phẩm">
              <button type="button" class="sort-dropdown__option" role="option" data-sort-option data-value="price-asc" aria-selected="false">
                <span>Giá: Thấp đến Cao</span>
                <svg class="sort-dropdown__check" data-sort-check viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                  <path fill-rule="evenodd" d="M16.704 4.153a.75.75 0 01.143 1.052l-8 10.5a.75.75 0 01-1.127.075l-4.5-4.5a.75.75 0 011.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 011.05-.143z" clip-rule="evenodd" />
                </svg>
              </button>
              <button type="button" class="sort-dropdown__option" role="option" data-sort-option data-value="price-desc" aria-selected="false">
                <span>Giá: Cao đến Thấp</span>
                <svg class="sort-dropdown__check" data-sort-check viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                  <path fill-rule="evenodd" d="M16.704 4.153a.75.75 0 01.143 1.052l-8 10.5a.75.75 0 01-1.127.075l-4.5-4.5a.75.75 0 011.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 011.05-.143z" clip-rule="evenodd" />
                </svg>
              </button>
              <button type="button" class="sort-dropdown__option" role="option" data-sort-option data-value="bestseller" aria-selected="false">
                <span>Bán chạy nhất</span>
                <svg class="sort-dropdown__check" data-sort-check viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                  <path fill-rule="evenodd" d="M16.704 4.153a.75.75 0 01.143 1.052l-8 10.5a.75.75 0 01-1.127.075l-4.5-4.5a.75.75 0 011.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 011.05-.143z" clip-rule="evenodd" />
                </svg>
              </button>
              <button type="button" class="sort-dropdown__option" role="option" data-sort-option data-value="name-asc" aria-selected="false">
                <span>Tên: Từ A đến Z</span>
                <svg class="sort-dropdown__check" data-sort-check viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                  <path fill-rule="evenodd" d="M16.704 4.153a.75.75 0 01.143 1.052l-8 10.5a.75.75 0 01-1.127.075l-4.5-4.5a.75.75 0 011.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 011.05-.143z" clip-rule="evenodd" />
                </svg>
              </button>
              <button type="button" class="sort-dropdown__option" role="option" data-sort-option data-value="name-desc" aria-selected="false">
                <span>Tên: Từ Z đến A</span>
                <svg class="sort-dropdown__check" data-sort-check viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                  <path fill-rule="evenodd" d="M16.704 4.153a.75.75 0 01.143 1.052l-8 10.5a.75.75 0 01-1.127.075l-4.5-4.5a.75.75 0 011.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 011.05-.143z" clip-rule="evenodd" />
                </svg>
              </button>
              <button type="button" class="sort-dropdown__option" role="option" data-sort-option data-value="newest" aria-selected="false">
                <span>Hàng mới nhất</span>
                <svg class="sort-dropdown__check" data-sort-check viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                  <path fill-rule="evenodd" d="M16.704 4.153a.75.75 0 01.143 1.052l-8 10.5a.75.75 0 01-1.127.075l-4.5-4.5a.75.75 0 011.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 011.05-.143z" clip-rule="evenodd" />
                </svg>
              </button>
              <button type="button" class="sort-dropdown__option" role="option" data-sort-option data-value="oldest" aria-selected="false">
                <span>Cũ nhất</span>
                <svg class="sort-dropdown__check" data-sort-check viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                  <path fill-rule="evenodd" d="M16.704 4.153a.75.75 0 01.143 1.052l-8 10.5a.75.75 0 01-1.127.075l-4.5-4.5a.75.75 0 011.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 011.05-.143z" clip-rule="evenodd" />
                </svg>
              </button>
            </div>
          </div>
        </div>

        
        <div class="product-list" id="home-product-list">
          
        </div>

        
        <div class="pagination-bar" id="pagination-container">
          
        </div>
      </section>

      
      <div id="footer-placeholder"></div>
    </div>
  </div>

  
  <div id="chatbox-widget" class="chatbot-widget">
    <div id="chat-window" class="chat-window hidden">
      <div class="chat-header">
        <div class="chat-header-left">
          <button id="chat-back-btn" class="chat-back-btn hidden">
            <i data-lucide="chevron-left"></i>
          </button>
          <div class="bot-avatar">
            <i id="chat-header-icon" data-lucide="message-circle"></i>
            <span class="bot-status-dot"></span>
          </div>
          <div>
            <h4 id="chat-header-title" class="bot-name">Hỗ trợ trực tuyến</h4>
            <span id="chat-header-status" class="bot-status">Sẵn sàng hỗ trợ</span>
          </div>
        </div>
        <button id="close-chat-btn" class="close-chat-btn">
          <i data-lucide="x"></i>
        </button>
      </div>
      <div id="view-chat-detail" class="chat-view active">
        <div id="chat-messages" class="chat-messages"></div>
        <div class="chat-input-area">
          <input type="text" id="chat-input" placeholder="Nhập tin nhắn..." autocomplete="off" />
          <button id="send-chat-btn" class="send-chat-btn">
            <i data-lucide="send" class="chat-send-icon"></i>
          </button>
        </div>
      </div>
    </div>
    <button id="chatbot-toggle-btn" class="chatbot-toggle-btn">
      <div class="bot-icon-wrapper">
        <i data-lucide="message-circle" class="chat-toggle-icon"></i>
      </div>
      <span id="chat-badge" class="chat-badge hidden">0</span>
      <span class="toggle-ping"></span>
    </button>
  </div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    
    async function loadTemplate(placeholderId, filePath) {
      try {
        const response = await fetch(filePath);
        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
        const content = await response.text();
        document.getElementById(placeholderId).innerHTML = content;
      } catch (error) {
        console.error(`Failed to load ${filePath}:`, error);
      }
    }

    async function initPageComponents() {
      await Promise.all([
        loadTemplate('header-placeholder', 'components/header.html'),
        loadTemplate('footer-placeholder', 'components/footer.html')
      ]);

      if (window.lucide) {
        lucide.createIcons();
      }

      
      const sortScript = document.createElement('script');
      sortScript.src = 'js/sort-dropdown.js?v=' + Date.now();
      document.body.appendChild(sortScript);

      sortScript.onload = () => {
        const script = document.createElement('script');
        script.src = 'js/san-pham.js?v=' + Date.now();
        document.body.appendChild(script);
      };
    }

    document.addEventListener("DOMContentLoaded", initPageComponents);
  </script>
</body>

</html>
