<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tất cả sản phẩm - TL Shop</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">

  <!-- Sử dụng lại chính xác CSS Style gốc của hệ thống để đồng bộ giao diện -->
  <link rel="stylesheet" href="css/style.css">

  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* ==============================================================
       CSS CHO PHÂN TRANG (PAGINATION BAR CSS) - CHUYÊN GIA FRONTEND
       Đồng bộ phong cách sang trọng ngọc lục bảo (#053225) & vàng đồng
       ============================================================== */
    .pagination-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1.75rem;
      margin-top: 4rem;
      margin-bottom: 3rem;
      font-family: var(--font-sans), -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      user-select: none;
    }
    
    .pag-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      border: none;
      background: transparent;
      color: #6b7280;
      padding: 0.5rem 0.75rem;
      font-size: 0.8125rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      cursor: pointer;
      outline: none;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
    }
    
    .pag-btn:hover:not(:disabled) {
      color: #053225;
      transform: translateY(-1px);
    }

    .pag-btn:active:not(:disabled) {
      transform: translateY(0);
    }
    
    .pag-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    
    .pag-pages {
      display: flex;
      gap: 1.25rem;
      align-items: center;
    }
    
    .pag-page {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      color: #9ca3af;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      height: 2.25rem;
      min-width: 1.5rem;
      position: relative;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    .pag-page:hover {
      color: #053225;
      transform: scale(1.08);
    }
    
    .pag-page.active {
      color: #053225;
      font-weight: 700;
    }
    
    .pag-page.active::after {
      content: '';
      position: absolute;
      bottom: 2px;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      height: 4px;
      background-color: #053225;
      border-radius: 50%;
      animation: scaleIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    
    .pag-ellipsis {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.5rem;
      height: 2.25rem;
      color: #d1d5db;
      font-size: 0.875rem;
      letter-spacing: 0.1em;
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: translateX(-50%) scale(0);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) scale(1);
      }
    }

    .catalog-hero {
      background: linear-gradient(135deg, #053225, #0a1f1a);
      color: #fff;
      padding: 3rem 1.5rem;
      text-align: center;
      margin-bottom: 2rem;
    }

    .catalog-hero h1 {
      font-family: var(--font-display);
      font-size: 2.25rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }

    .catalog-hero p {
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.7);
      max-width: 600px;
      margin: 0 auto;
      font-weight: 300;
    }
  </style>
</head>

<body class="app-body">

  <div id="main-content" class="main-content">

    <div id="screen-light" class="screen-view light-theme show">
      <!-- PLACEHOLDER ĐƯỢC LOAD TỰ ĐỘNG BỞI JS -->
      <div id="header-placeholder"></div>

      <!-- BANNER TIÊU ĐỀ TRANG MỚI -->
      <div class="catalog-hero">
        <h1>BỘ SƯU TẬP SẢN PHẨM</h1>
        <p>Khám phá toàn bộ dải sản phẩm giày thể thao cao cấp nhất tại TL Shop. Trải nghiệm tốc độ, sự êm ái và đẳng cấp thời thượng.</p>
      </div>

      <!-- SECTION HIỂN THỊ SẢN PHẨM -->
      <!-- Tận dụng các class CSS có sẵn của hệ thống: products-section, light-products -->
      <section class="products-section light-products" style="padding-top: 1rem;">
        
        <!-- Cấu trúc Lưới sản phẩm dùng lại class CSS gốc: product-list -->
        <div class="product-list" id="home-product-list">
          <!-- Rendered by JavaScript dynamically -->
        </div>

        <!-- CONTAINER THANH PHÂN TRANG -->
        <div class="pagination-bar" id="pagination-container">
          <!-- Rendered by JavaScript dynamically -->
        </div>
      </section>

      <!-- PLACEHOLDER FOOTER ĐƯỢC LOAD TỰ ĐỘNG BỞI JS -->
      <div id="footer-placeholder"></div>
    </div>
  </div>

  <!-- CHATBOX WIDGET TƯƠNG TỰ TRANG CHỦ -->
  <div id="chatbox-widget" class="chatbot-widget">
    <div id="chat-window" class="chat-window hidden">
      <div class="chat-header">
        <div class="chat-header-left">
          <button id="chat-back-btn" class="chat-back-btn hidden">
            <i data-lucide="chevron-left"></i>
          </button>
          <div class="bot-avatar">
            <i id="chat-header-icon" data-lucide="message-circle"></i>
            <span class="bot-status-dot"></span>
          </div>
          <div>
            <h4 id="chat-header-title" class="bot-name">Hỗ trợ trực tuyến</h4>
            <span id="chat-header-status" class="bot-status">Sẵn sàng hỗ trợ</span>
          </div>
        </div>
        <button id="close-chat-btn" class="close-chat-btn">
          <i data-lucide="x"></i>
        </button>
      </div>
      <div id="view-chat-detail" class="chat-view active">
        <div id="chat-messages" class="chat-messages"></div>
        <div class="chat-input-area">
          <input type="text" id="chat-input" placeholder="Nhập tin nhắn..." autocomplete="off" />
          <button id="send-chat-btn" class="send-chat-btn">
            <i data-lucide="send" style="width:16px;height:16px;"></i>
          </button>
        </div>
      </div>
    </div>
    <button id="chatbot-toggle-btn" class="chatbot-toggle-btn">
      <div class="bot-icon-wrapper">
        <i data-lucide="message-circle" style="color:white; width:28px; height:28px;"></i>
      </div>
      <span id="chat-badge" class="chat-badge hidden">0</span>
      <span class="toggle-ping"></span>
    </button>
  </div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    // Hàm tải template tĩnh (header & footer) để đồng bộ cấu trúc hệ thống
    async function loadTemplate(placeholderId, filePath) {
      try {
        const response = await fetch(filePath);
        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
        const content = await response.text();
        document.getElementById(placeholderId).innerHTML = content;
      } catch (error) {
        console.error(`Failed to load ${filePath}:`, error);
      }
    }

    async function initPageComponents() {
      await Promise.all([
        loadTemplate('header-placeholder', 'components/header.html'),
        loadTemplate('footer-placeholder', 'components/footer.html')
      ]);

      if (window.lucide) {
        lucide.createIcons();
      }

      // Tải động script logic xử lý phân trang và chatbot tương ứng cho san-pham.html
      const script = document.createElement('script');
      script.src = 'js/san-pham.js?v=' + Date.now();
      document.body.appendChild(script);
    }

    document.addEventListener("DOMContentLoaded", initPageComponents);
  </script>
</body>

</html>
