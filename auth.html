<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập | TL Shop</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body class="auth-page light-theme">
  <div id="notification-container" class="notification-container"></div>

  <div class="auth-container">
    <div class="auth-left">
      <div class="auth-branding">
        <a href="index.html" class="brand-link">
          <span class="brand-text">TL Shop</span>
          <span class="brand-dot emerald"></span>
        </a>
        <p class="auth-slogan">Bước chân dẫn đầu xu hướng. Đăng nhập để trải nghiệm những đặc quyền đẳng cấp nhất.</p>
      </div>
    </div>
    <div class="auth-right">
      <div class="auth-box">

        <!-- LOGIN FORM -->
        <div id="login-form-wrapper" class="form-wrapper active">
          <h2 class="auth-title">Đăng nhập</h2>
          <p class="auth-subtitle">Chào mừng bạn trở lại với TL Shop</p>

          <form id="login-form">
            <div class="input-group">
              <label for="login-email">Email hoặc Tài khoản</label>
              <div class="input-field">
                <i data-lucide="mail"></i>
                <input type="text" id="login-email" placeholder="Nhập địa chỉ email hoặc tài khoản" required />
              </div>
            </div>

            <div class="input-group">
              <label for="login-password">Mật khẩu</label>
              <div class="input-field">
                <i data-lucide="lock"></i>
                <input type="password" id="login-password" placeholder="Nhập mật khẩu" required />
                <button type="button" class="toggle-password" tabindex="-1">
                  <i data-lucide="eye"></i>
                </button>
              </div>
            </div>

            <div class="auth-actions">
              <label class="remember-me">
                <input type="checkbox" id="login-remember" />
                <span>Ghi nhớ đăng nhập</span>
              </label>
              <a href="#" class="forgot-pwd">Quên mật khẩu?</a>
            </div>

            <button type="submit" class="auth-btn">Đăng Nhập</button>
          </form>

          <p class="auth-switch">Chưa có tài khoản? <a href="#" id="go-to-register">Đăng ký ngay</a></p>

          <div
            style="text-align: center; margin-top: 20px; margin-bottom: 15px; color: rgba(255,255,255,0.5); font-size: 0.85rem;">
            <span>HOẶC</span>
          </div>

          <!-- Nút Đăng nhập Google -->
          <div id="g_id_onload"
            data-client_id="182083006593-oi9dkbtljvrghoqfpvkhm2aqathflste.apps.googleusercontent.com"
            data-context="signin" data-ux_mode="popup" data-callback="handleGoogleCredentialResponse"
            data-auto_prompt="false">
          </div>
          <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="outline"
            data-text="signin_with" data-size="large" data-logo_alignment="left"
            style="display: flex; justify-content: center;">
          </div>
        </div>

        <!-- REGISTER FORM -->
        <div id="register-form-wrapper" class="form-wrapper">
          <h2 class="auth-title">Tạo tài khoản</h2>
          <p class="auth-subtitle">Gia nhập cộng đồng TL Shop ngay hôm nay</p>

          <form id="register-form">
            <div class="input-group">
              <label for="register-name">Họ và tên</label>
              <div class="input-field">
                <i data-lucide="user"></i>
                <input type="text" id="register-name" placeholder="Nguyễn Văn A" required />
              </div>
            </div>

            <div class="input-group">
              <label for="register-email">Email</label>
              <div class="input-field">
                <i data-lucide="mail"></i>
                <input type="email" id="register-email" placeholder="Nhập địa chỉ email" required />
              </div>
            </div>

            <div class="input-group">
              <label for="register-phone">Số điện thoại</label>
              <div class="input-field">
                <i data-lucide="phone"></i>
                <input type="tel" id="register-phone" placeholder="Nhập số điện thoại" required />
              </div>
            </div>

            <div class="input-group">
              <label for="register-address">Địa chỉ</label>
              <div class="input-field">
                <i data-lucide="map-pin"></i>
                <input type="text" id="register-address" placeholder="Nhập địa chỉ" required />
              </div>
            </div>

            <div class="input-group">
              <label for="register-password">Mật khẩu</label>
              <div class="input-field">
                <i data-lucide="lock"></i>
                <input type="password" id="register-password" placeholder="Tạo mật khẩu" required />
                <button type="button" class="toggle-password" tabindex="-1">
                  <i data-lucide="eye"></i>
                </button>
              </div>
            </div>

            <div class="input-group">
              <label for="register-repassword">Xác nhận mật khẩu</label>
              <div class="input-field">
                <i data-lucide="check-circle"></i>
                <input type="password" id="register-repassword" placeholder="Nhập lại mật khẩu" required />
                <button type="button" class="toggle-password" tabindex="-1">
                  <i data-lucide="eye"></i>
                </button>
              </div>
            </div>

            <button type="submit" class="auth-btn">Đăng Ký</button>
          </form>

          <p class="auth-switch">Đã có tài khoản? <a href="#" id="go-to-login">Đăng nhập</a></p>
        </div>

      </div>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script>lucide.createIcons();</script>
  <script src="js/auth.js"></script>
</body>

</html>
